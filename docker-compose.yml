version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: chivas_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: chivas
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Map the SQL files to the initialization folder with numerical prefixes for execution order
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/procedures.sql:/docker-entrypoint-initdb.d/2_procedures.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/3_seed.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chivas_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Use the container name 'db' as the host for MySQL
      - ConnectionStrings__DefaultConnection=Server=db;Database=chivas;User=root;Password=password;
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chivas_web
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  db_data:
